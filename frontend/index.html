<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Chat — TP DevOps</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    /* ══════════════════════════════════════════
       RESET & VARIABLES
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0e13;
      --surface:     #13171f;
      --surface2:    #1c2230;
      --border:      #252d3d;
      --accent:      #00e5a0;
      --accent-dim:  rgba(0,229,160,.12);
      --accent2:     #4d9fff;
      --danger:      #ff5c5c;
      --text:        #dde3f0;
      --muted:       #4a5568;
      --radius-sm:   8px;
      --radius:      14px;
      --radius-lg:   20px;
      --mono:        'IBM Plex Mono', monospace;
      --sans:        'Sora', sans-serif;
      --shadow:      0 4px 24px rgba(0,0,0,.4);
    }

    /* ══════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════ */
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      max-width: 780px;
      margin: 0 auto;
      padding: 16px;
      gap: 12px;
      background-image:
        radial-gradient(ellipse 70% 50% at 100% 0%, rgba(0,229,160,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 0% 100%, rgba(77,159,255,.06) 0%, transparent 60%);
    }

    /* ══════════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════════ */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -.3px;
    }

    .logo-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: glow-pulse 2s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%,100% { opacity:1; box-shadow: 0 0 8px var(--accent); }
      50%      { opacity:.4; box-shadow: 0 0 2px var(--accent); }
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .status-pill {
      font-family: var(--mono);
      font-size: .62rem;
      letter-spacing: .8px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 100px;
    }

    .status-pill.live {
      color: var(--accent);
      border-color: rgba(0,229,160,.3);
      background: var(--accent-dim);
    }

    /* ══════════════════════════════════════════
       PSEUDO BAR
    ══════════════════════════════════════════ */
    .pseudo-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color .2s;
    }

    .pseudo-bar:focus-within { border-color: var(--accent2); }

    .pseudo-label {
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 1px;
    }

    .pseudo-divider {
      width: 1px; height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    #pseudo {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: .88rem;
      font-weight: 600;
    }

    #pseudo::placeholder { color: var(--muted); font-weight: 400; }

    .avatar-badge {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: .7rem;
      font-weight: 600;
      flex-shrink: 0;
      transition: background .3s, color .3s;
    }

    /* ══════════════════════════════════════════
       MESSAGES ZONE
    ══════════════════════════════════════════ */
    .messages-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .messages-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .messages-title {
      font-family: var(--mono);
      font-size: .65rem;
      letter-spacing: 1.2px;
      color: var(--muted);
    }

    .refresh-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .6rem;
      padding: 3px 8px;
      cursor: pointer;
      letter-spacing: .5px;
      transition: border-color .2s, color .2s;
    }

    .refresh-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    .countdown {
      font-family: var(--mono);
      font-size: .6rem;
      color: var(--muted);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      padding: 40px 0;
    }

    .empty-icon { font-size: 2.5rem; opacity: .25; }

    .empty-text {
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .5px;
    }

    /* ── Message bubble ── */
    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: slide-up .22s ease both;
    }

    @keyframes slide-up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg.mine { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: .6rem;
      font-weight: 600;
    }

    .msg-body {
      max-width: 68%;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .msg.mine .msg-body { align-items: flex-end; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .62rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .msg-author { font-weight: 600; }

    .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 3px;
      padding: 9px 13px;
      font-size: .88rem;
      line-height: 1.55;
      word-break: break-word;
      color: var(--text);
    }

    .msg.mine .msg-bubble {
      border-radius: 12px 12px 3px 12px;
      border-color: rgba(0,229,160,.2);
      background: rgba(0,229,160,.07);
    }

    /* ── Error bubble ── */
    .error-bubble {
      align-self: center;
      background: rgba(255,92,92,.08);
      border: 1px solid rgba(255,92,92,.25);
      border-radius: var(--radius-sm);
      color: var(--danger);
      font-family: var(--mono);
      font-size: .7rem;
      padding: 6px 14px;
      letter-spacing: .5px;
    }

    /* ══════════════════════════════════════════
       INPUT ZONE
    ══════════════════════════════════════════ */
    .input-zone {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: .9rem;
      padding: 12px 16px;
      outline: none;
      resize: none;
      max-height: 110px;
      line-height: 1.5;
      transition: border-color .2s;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      color: #0b0e13;
      border: none;
      border-radius: var(--radius);
      width: 46px; height: 46px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 0 rgba(0,229,160,0);
    }

    .send-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 16px rgba(0,229,160,.35);
    }

    .send-btn:active { transform: scale(.94); }

    .send-btn svg { width: 19px; height: 19px; }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 480px) {
      body { padding: 10px; gap: 8px; }
      .pseudo-label, .pseudo-divider { display: none; }
      .msg-body { max-width: 80%; }
    }
  </style>
</head>
<body>

  <!-- ── TOP BAR ── -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-indicator"></div>
      MINI·CHAT
    </div>
    <div class="topbar-right">
      <span class="status-pill" id="conn-status">CONNEXION…</span>
    </div>
  </div>

  <!-- ── PSEUDO BAR ── -->
  <div class="pseudo-bar">
    <span class="pseudo-label">PSEUDO</span>
    <div class="pseudo-divider"></div>
    <input id="pseudo" type="text" maxlength="24" placeholder="Entrez votre pseudo…" autocomplete="off" spellcheck="false"/>
    <div class="avatar-badge" id="avatar-badge" style="background:#1c2230;color:#4a5568;">?</div>
  </div>

  <!-- ── MESSAGES ── -->
  <div class="messages-wrapper">
    <div class="messages-header">
      <span class="messages-title">MESSAGES</span>
      <div class="refresh-row">
        <span class="countdown" id="countdown">— s</span>
        <button class="refresh-btn" id="refresh-btn">↻ REFRESH</button>
      </div>
    </div>
    <div id="messages">
      <div class="empty" id="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-text">AUCUN MESSAGE — SOYEZ LE PREMIER !</div>
      </div>
    </div>
  </div>

  <!-- ── INPUT ── -->
  <div class="input-zone">
    <textarea id="msg-input" rows="1" placeholder="Votre message… (Entrée pour envoyer)" maxlength="500"></textarea>
    <button class="send-btn" id="send-btn" title="Envoyer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

<script>
  /* ── CONFIG ── */
  const API_URL = 'https://tp-exam-chat-v2.onrender.com';
  const REFRESH_INTERVAL = 4000; // ms

  /* ── COLOR PALETTE per author ── */
  const COLORS = [
    ['#00e5a0','#0b0e13'], ['#4d9fff','#0b0e13'], ['#ff9f47','#0b0e13'],
    ['#c47aff','#fff'],    ['#ff6b6b','#fff'],    ['#47ffdc','#0b0e13'],
    ['#ffdd47','#0b0e13'], ['#ff47a0','#fff'],
  ];

  function hashName(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    return h;
  }

  function colorFor(name) { return COLORS[hashName(name) % COLORS.length]; }
  function initials(name) { return (name||'?').trim().slice(0,2).toUpperCase(); }
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }

  /* ── STATE ── */
  let knownIds   = new Set();
  let countdown  = REFRESH_INTERVAL / 1000;
  let timerTick  = null;
  let connected  = false;

  /* ── ELEMENTS ── */
  const pseudoEl   = document.getElementById('pseudo');
  const avatarEl   = document.getElementById('avatar-badge');
  const messagesEl = document.getElementById('messages');
  const emptyEl    = document.getElementById('empty-state');
  const msgInput   = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const refreshBtn = document.getElementById('refresh-btn');
  const connStatus = document.getElementById('conn-status');
  const countdownEl= document.getElementById('countdown');

  /* ── AVATAR UPDATE ── */
  pseudoEl.addEventListener('input', () => {
    const v = pseudoEl.value.trim();
    if (v) {
      const [bg, fg] = colorFor(v);
      avatarEl.style.background = bg;
      avatarEl.style.color = fg;
      avatarEl.textContent = initials(v);
    } else {
      avatarEl.style.background = '#1c2230';
      avatarEl.style.color = '#4a5568';
      avatarEl.textContent = '?';
    }
  });

  /* ── FETCH MESSAGES ── */
  async function fetchMessages() {
    try {
      const res  = await fetch(`${API_URL}/api/messages`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setConnected(true);
      renderMessages(data);
    } catch (e) {
      setConnected(false);
      showError(`Impossible de joindre le serveur (${e.message})`);
    }
  }

  /* ── RENDER ── */
  function renderMessages(msgs) {
    const pseudo  = pseudoEl.value.trim();
    const newMsgs = msgs.filter(m => !knownIds.has(m.id ?? m._id ?? m.timestamp));

    if (newMsgs.length === 0 && knownIds.size > 0) return;

    if (msgs.length === 0) {
      if (!emptyEl.parentNode) {
        messagesEl.innerHTML = '';
        messagesEl.appendChild(emptyEl);
      }
      return;
    }

    if (emptyEl.parentNode) emptyEl.parentNode.removeChild(emptyEl);

    // First full render
    if (knownIds.size === 0) {
      messagesEl.innerHTML = '';
      msgs.forEach(m => appendBubble(m, pseudo));
    } else {
      newMsgs.forEach(m => appendBubble(m, pseudo));
    }

    msgs.forEach(m => knownIds.add(m.id ?? m._id ?? m.timestamp));
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendBubble(m, pseudo) {
    const author  = escHtml(m.author || 'Anonyme');
    const content = escHtml(m.content || m.text || '');
    const ts      = m.timestamp || m.ts || Date.now();
    const isMine  = pseudo && m.author === pseudo;
    const [bg, fg] = colorFor(m.author || '');

    const wrap = document.createElement('div');
    wrap.className = 'msg' + (isMine ? ' mine' : '');

    wrap.innerHTML = `
      <div class="msg-avatar" style="background:${bg};color:${fg}">${initials(m.author)}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-author" style="color:${bg}">${author}</span>
          <span>${fmtTime(ts)}</span>
        </div>
        <div class="msg-bubble">${content}</div>
      </div>`;

    messagesEl.appendChild(wrap);
  }

  function showError(text) {
    // only show once per fetch
    const last = messagesEl.lastElementChild;
    if (last && last.classList.contains('error-bubble')) last.remove();
    const el = document.createElement('div');
    el.className = 'error-bubble';
    el.textContent = `⚠ ${text}`;
    messagesEl.appendChild(el);
  }

  /* ── CONNECTION STATUS ── */
  function setConnected(ok) {
    connected = ok;
    connStatus.textContent = ok ? 'EN LIGNE' : 'HORS LIGNE';
    connStatus.className   = 'status-pill' + (ok ? ' live' : '');
  }

  /* ── SEND MESSAGE ── */
  async function sendMessage() {
    const author  = pseudoEl.value.trim();
    const content = msgInput.value.trim();

    if (!author) {
      pseudoEl.parentElement.style.borderColor = 'var(--danger)';
      pseudoEl.focus();
      setTimeout(() => pseudoEl.parentElement.style.borderColor = '', 1500);
      return;
    }
    if (!content) return;

    sendBtn.disabled = true;

    try {
      const res = await fetch(`${API_URL}/api/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ author, content }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      msgInput.value = '';
      msgInput.style.height = '';
      await fetchMessages();
    } catch (e) {
      showError(`Envoi échoué : ${e.message}`);
    } finally {
      sendBtn.disabled = false;
    }
  }

  /* ── EVENTS ── */
  sendBtn.addEventListener('click', sendMessage);

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 110) + 'px';
  });

  refreshBtn.addEventListener('click', () => {
    countdown = REFRESH_INTERVAL / 1000;
    fetchMessages();
  });

  /* ── AUTO REFRESH TIMER ── */
  function startTimer() {
    if (timerTick) clearInterval(timerTick);
    countdown = REFRESH_INTERVAL / 1000;

    timerTick = setInterval(() => {
      countdown--;
      countdownEl.textContent = `${countdown}s`;
      if (countdown <= 0) {
        countdown = REFRESH_INTERVAL / 1000;
        fetchMessages();
      }
    }, 1000);
  }

  /* ── INIT ── */
  fetchMessages();
  startTimer();
</script>
</body>
</html>
